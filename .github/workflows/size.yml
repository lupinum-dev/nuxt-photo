name: release-readiness

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  release-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: pnpm

      - run: corepack enable
      - run: corepack prepare pnpm@10.10.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:unit
      - run: pnpm test:module-package
      - run: pnpm size
      - run: pnpm build:playground
      - run: pnpm --filter nuxt-photo-playground-tw build
      - run: pnpm build:docs
      - run: pnpm test:e2e
      - run: pnpm release:pack
